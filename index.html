<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Relatório de Jogo - Americano FC</title>

  <style>
    body {
      font-family: Arial;
      background: #0f0f0f;
      color: white;
      padding: 20px;
    }

    h1 {
      color: gold;
      text-align: center;
    }

    h2 {
      color: gold;
    }

    .card {
      background: #1c1c1c;
      padding: 20px;
      margin: 15px 0;
      border-radius: 12px;
      border: 1px solid #333;
    }

    input, select {
      padding: 10px;
      margin: 6px 0;
      border-radius: 6px;
      border: none;
      width: 100%;
      font-size: 14px;
    }

    label {
      font-size: 13px;
      color: #ccc;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .status {
      margin-top: 10px;
      font-size: 13px;
      color: #aaa;
    }
  </style>
</head>

<body>

<h1>⚽ Relatório de Jogo - Americano FC</h1>

<!-- PARTIDA -->
<div class="card">
  <h2>📋 Informações da Partida</h2>

  <div class="grid">

    <div>
      <label>ID Partida</label>
      <input type="number" id="idPartida">
    </div>

    <div>
      <label>Data</label>
      <input type="date" id="data">
    </div>

    <div>
      <label>Competição</label>
      <input type="text" id="competicao">
    </div>

    <div>
      <label>Fase</label>
      <input type="text" id="fase">
    </div>

    <div>
      <label>Local</label>
      <select id="local">
        <option>Casa</option>
        <option>Fora</option>
      </select>
    </div>

    <div>
      <label>Adversário</label>
      <input type="text" id="adversario">
    </div>

    <div>
      <label>Mandante</label>
      <input type="text" id="mandante" value="Americano FC">
    </div>

    <div>
      <label>Visitante</label>
      <input type="text" id="visitante">
    </div>

    <div>
      <label>Gols Mandante</label>
      <input type="number" id="golsMandante">
    </div>

    <div>
      <label>Gols Visitante</label>
      <input type="number" id="golsVisitante">
    </div>

    <div>
      <label>Placar</label>
      <input type="text" id="placar" readonly>
    </div>

    <div>
      <label>Resultado</label>
      <input type="text" id="resultado" readonly>
    </div>

  </div>
</div>

<!-- ESCALAÇÃO -->
<div class="card">
  <h2>👥 Escalação</h2>

  <label>Selecionar Jogador</label>
  <select id="jogadores">
    <option>Carregando...</option>
  </select>

  <label>Status</label>
  <select id="status">
    <option>Titular</option>
    <option>Reserva</option>
    <option>Não Relacionado</option>
  </select>

  <label>Minutos Jogados</label>
  <input type="number" id="minutos">

  <label>Nota</label>
  <input type="number" id="nota" min="0" max="10">

  <div class="status" id="statusAPI"></div>
</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxzSHIqzJJED92lcvLiiOeg1t08I7ypBvOeH4dRQqIWTk5BvswYFzPKztiQ4FoVGpDj/exec";

async function carregarDados() {
  const status = document.getElementById("statusAPI");

  try {
    const res = await fetch(API_URL);
    const data = await res.json();

    console.log("DADOS:", data);

    const select = document.getElementById("jogadores");
    select.innerHTML = "";

    if (!data.jogadoresPro) {
      status.innerText = "⚠️ jogadoresPro não encontrado";
      return;
    }

    data.jogadoresPro.forEach(j => {
      let opt = document.createElement("option");
      opt.value = j.ID_Jogador;
      opt.textContent = j.Nome;
      select.appendChild(opt);
    });

    status.innerText = "✅ Dados carregados com sucesso";

  } catch (erro) {
    console.error(erro);
    status.innerText = "❌ Erro ao conectar com API";
  }
}

carregarDados();

</script>

</body>
</html>
